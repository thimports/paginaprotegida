<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirmação Segura</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #00133f;
    }

    .container {
      width: 100%;
      max-width: 620px;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 34px;
      font-weight: 800;
      margin-bottom: 20px;
      color: #00133f;
    }

    .subtitle {
      font-size: 18px;
      line-height: 1.6;
      color: #4c6385;
      margin-bottom: 42px;
    }

    .slider {
      width: 100%;
      height: 70px;
      background: #eef3fa;
      border: 1px solid #dbe3ef;
      border-radius: 999px;
      position: relative;
      overflow: hidden;
      user-select: none;
      touch-action: none;
    }

    .slider-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 600;
      color: #5a6f8e;
      pointer-events: none;
    }

    .button {
      width: 62px;
      height: 62px;
      background: #5f00b8;
      border-radius: 50%;
      position: absolute;
      top: 3px;
      left: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 34px;
      cursor: grab;
      box-shadow: 0 0 0 5px rgba(95, 0, 184, 0.12);
      transition: background 0.2s ease;
      z-index: 2;
    }

    .button:active {
      cursor: grabbing;
    }

    .progress {
      height: 100%;
      width: 0;
      background: rgba(95, 0, 184, 0.08);
      border-radius: 999px;
      position: absolute;
      left: 0;
      top: 0;
    }

    .info {
      margin-top: 15px;
      font-size: 15px;
      color: #4c6385;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 28px;
      }

      .subtitle {
        font-size: 16px;
      }

      .container {
        padding: 24px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Confirmação segura</h1>

    <p class="subtitle">
      Para evitar erros e cliques acidentais, arraste o botão roxo até o final
      para prosseguir.
    </p>

    <div class="slider" id="slider">
      <div class="progress" id="progress"></div>
      <div class="slider-text">Arraste para continuar</div>
      <div class="button" id="button">→</div>
    </div>

    <p class="info">
      Arraste o botão até o final para evitar cliques acidentais
    </p>
  </div>

  <script>
    const LINK_DESTINO = "https://lojanetshoesbrasil.shop/";

    const slider = document.getElementById("slider");
    const button = document.getElementById("button");
    const progress = document.getElementById("progress");

    let isDragging = false;

    function getClientX(e) {
      return e.touches ? e.touches[0].clientX : e.clientX;
    }

    function moveButton(e) {
      if (!isDragging) return;

      const sliderRect = slider.getBoundingClientRect();
      const buttonWidth = button.offsetWidth;
      const maxMove = slider.offsetWidth - buttonWidth - 8;

      let position = getClientX(e) - sliderRect.left - buttonWidth / 2;

      if (position < 4) position = 4;
      if (position > maxMove) position = maxMove;

      button.style.left = position + "px";
      progress.style.width = position + buttonWidth / 2 + "px";

      if (position >= maxMove - 5) {
        window.location.href = LINK_DESTINO;
      }
    }

    function stopDrag() {
      if (!isDragging) return;
      isDragging = false;

      const buttonLeft = parseInt(button.style.left || 4);
      const maxMove = slider.offsetWidth - button.offsetWidth - 8;

      if (buttonLeft < maxMove - 5) {
        button.style.left = "4px";
        progress.style.width = "0";
      }
    }

    button.addEventListener("mousedown", () => isDragging = true);
    button.addEventListener("touchstart", () => isDragging = true);

    document.addEventListener("mousemove", moveButton);
    document.addEventListener("touchmove", moveButton);

    document.addEventListener("mouseup", stopDrag);
    document.addEventListener("touchend", stopDrag);
  </script>

</body>
</html>
